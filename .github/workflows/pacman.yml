name: Generate Arcade Contribution Games

on:
  schedule: # execute every 12 hours
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate-pacman:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate Pac-Man contribution graph
        uses: abozanona/pacman-contribution-graph@main
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
        with:
          github_user_name: bibek1414
          games: "pacman"

      - name: Move files to output directory
        run: |
          mkdir -p output
          [ -f "dist/pacman-contribution-graph.svg" ]      && mv "dist/pacman-contribution-graph.svg"      "output/pacman-contribution-graph.svg"
          [ -f "dist/pacman-contribution-graph-dark.svg" ] && mv "dist/pacman-contribution-graph-dark.svg" "output/pacman-contribution-graph-dark.svg"
          echo "Files in output:"; ls -la output/

      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add output/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update pacman contribution graph [skip ci]"
            git push
          fi

  generate-breakout:
