name: Generate Arcade Contribution Games

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate-all-games:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate all contribution graphs
        uses: abozanona/pacman-contribution-graph@main
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
        with:
          github_user_name: bibek1414
          # Generate all games in ONE step
          games: "pacman,breakout,galaga,puzzle-bobble,bomberman"

      - name: Move files to output directory
        run: |
          mkdir -p output
          # Move all generated SVG files
          for game in pacman breakout galaga puzzle-bobble bomberman; do
            [ -f "dist/${game}-contribution-graph.svg" ] && mv "dist/${game}-contribution-graph.svg" "output/${game}-contribution-graph.svg"
            [ -f "dist/${game}-contribution-graph-dark.svg" ] && mv "dist/${game}-contribution-graph-dark.svg" "output/${game}-contribution-graph-dark.svg"
          done
          echo "Files in output:"; ls -la output/

      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add output/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update all arcade contribution graphs [skip ci]"
            git pull --rebase origin main
            git push
          fi
